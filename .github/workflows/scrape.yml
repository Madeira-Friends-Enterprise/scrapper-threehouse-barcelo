name: scrape

on:
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Write service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > credentials/service_account.json

      - name: Run scraper (headed via xvfb)
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ vars.GOOGLE_SHEET_GID }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          MIN_PRICED_ROWS: "100"
          HEADLESS: "false"
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python -m src.main -v

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            *.log
            threehouse_dump.html
            barcelo_funchal_dump.html
            barcelo_schema_dump.json
            barcelo_hotels.json
          if-no-files-found: ignore
